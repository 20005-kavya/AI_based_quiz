<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{

font-family:'Poppins',sans-serif;

background: linear-gradient(135deg,#f5f7fa,#c3cfe2);

min-height:100vh;

}

.dashboard-box{

margin-top:80px;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

max-width:500px;

margin-left:auto;

margin-right:auto;

}

.title{

font-weight:600;

margin-bottom:20px;

text-align:center;

}

.btn-generate{

background:linear-gradient(90deg,#4facfe,#00f2fe);

border:none;

font-weight:500;

}

#loader{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.loader-content{
    text-align:center;
    color:white;
}

.spinner{
    border:6px solid #f3f3f3;
    border-top:6px solid #4facfe;
    border-radius:50%;
    width:60px;
    height:60px;
    animation: spin 1s linear infinite;
    margin:auto;
    margin-bottom:15px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

{% include "navbar.html" %}

<div class="dashboard-box">

<h2 class="title">Generate AI Quiz</h2>

<form method="POST" onsubmit="showLoader()">

<div class="mb-3">

<input name="topic" class="form-control"
placeholder="Enter Topic (Example: Python, OOP, DBMS)"
required>

</div>

<button class="btn btn-generate w-100">

Generate Quiz

</button>

</form>

</div>

<!-- 🔥 LOADER -->
<div id="loader" style="display:none;">
    <div class="loader-content">
        <div class="spinner"></div>
        <h3>Generating Quiz... ⏳</h3>
        <p>AI is creating your questions...</p>
    </div>
</div>

<script>
function showLoader(){
    document.getElementById("loader").style.display = "flex";
}
</script>

</body>

</html>
