<!DOCTYPE html>
<html>

<head>

<title>Quiz Contest</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
min-height:100vh;
}

.timer-bar{

position:sticky;
top:0;
background: linear-gradient(90deg,#ff512f,#dd2476);
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:600;
z-index:1000;

}

.quiz-card{

background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}

.option{

display:block;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
transition:0.2s;

}

.option:hover{

background:#f1f5ff;
border-color:#4facfe;

}

.submit-btn{

background: linear-gradient(90deg,#4facfe,#00f2fe);
border:none;
color:white;
padding:12px 30px;
font-weight:500;
border-radius:8px;

}

.submit-btn:hover{

opacity:0.9;

}

.quit-btn{

background:#ffffff20;
border:1px solid white;
padding:8px 18px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:500;
transition:0.3s;

}

.quit-btn:hover{

background:white;
color:#dd2476;

}

#loader{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.loader-content{
    text-align:center;
    color:white;
}

.spinner{
    border:6px solid #f3f3f3;
    border-top:6px solid #00f2fe;
    border-radius:50%;
    width:60px;
    height:60px;
    animation: spin 1s linear infinite;
    margin:auto;
    margin-bottom:15px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="timer-bar d-flex justify-content-between align-items-center">

<div>
<i class="fa-solid fa-clock"></i>
Time Left: <span id="timer">30:00</span>
</div>

<a href="/quit_quiz" class="quit-btn">

<i class="fa-solid fa-circle-xmark"></i>
Quit Quiz

</a>

</div>


<div class="container mt-4">

<form action="/submit" method="POST" onsubmit="showLoader()">

{% for q in quiz %}

<div class="quiz-card">

<h5>

<b>{{ loop.index }}. {{ q.question }}</b>

</h5>

<label class="option">

<input type="radio" name="q{{ loop.index0 }}" value="A" required>

{{ q.A }}

</label>

<label class="option">

<input type="radio" name="q{{ loop.index0 }}" value="B">

{{ q.B }}

</label>

<label class="option">

<input type="radio" name="q{{ loop.index0 }}" value="C">

{{ q.C }}

</label>

<label class="option">

<input type="radio" name="q{{ loop.index0 }}" value="D">

{{ q.D }}

</label>

</div>

{% endfor %}

<div class="text-center mb-5">

<button type="submit" class="submit-btn">

<i class="fa-solid fa-paper-plane"></i>
Submit Quiz

</button>

</div>

</form>

</div>

<!-- 🔥 FULL SCREEN LOADER -->
<div id="loader" style="display:none;">
    <div class="loader-content">
        <div class="spinner"></div>
        <h3>Submitting Quiz... ⏳</h3>
        <p>Please wait, analyzing your answers...</p>
    </div>
</div>

<script>

let time = 30 * 60;

let timer = setInterval(function(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

    time--;

    if(time < 0){
        clearInterval(timer);
        alert("Time is over! Submitting quiz...");
        document.forms[0].submit();
    }

},1000);

function showLoader(){
    document.getElementById("loader").style.display = "flex";
}

</script>

</body>

</html>
